<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MeetEra — Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1e293b;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 36px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(99, 102, 241, 0.15);
      text-align: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #4f46e5, #8b5cf6);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 900;
      font-size: 36px;
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.35);
    }
    h1 {
      background: linear-gradient(135deg, #4f46e5, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .tagline {
      color: #64748b;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 36px;
    }
    .link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      text-decoration: none;
      color: #1e293b;
      margin-bottom: 12px;
      transition: all 0.2s;
      font-weight: 700;
    }
    .link:hover {
      border-color: #6366f1;
      background: #eef2ff;
      transform: translateY(-1px);
    }
    .link-text { text-align: left; }
    .link-title { font-size: 15px; }
    .link-sub {
      font-size: 12px;
      color: #64748b;
      font-weight: 500;
      margin-top: 2px;
    }
    .arrow {
      color: #6366f1;
      font-size: 20px;
      font-weight: 800;
    }
    .footer {
      margin-top: 28px;
      color: #94a3b8;
      font-size: 11px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">M</div>
    <h1>MeetEra</h1>
    <p class="tagline">Your World. Your Era.</p>

    <a class="link" href="terms.html">
      <div class="link-text">
        <div class="link-title">📄 Terms of Service</div>
        <div class="link-sub">How MeetEra works</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="link" href="privacy.html">
      <div class="link-text">
        <div class="link-title">🛡 Privacy Policy</div>
        <div class="link-sub">How we handle your data</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <a class="link" href="mailto:zeynepmaidedemir@gmail.com">
      <div class="link-text">
        <div class="link-title">✉️ Contact Support</div>
        <div class="link-sub">Get in touch</div>
      </div>
      <span class="arrow">→</span>
    </a>

    <p class="footer">© 2026 MeetEra · v1.0.0</p>
  </div>
</body>
</html>
